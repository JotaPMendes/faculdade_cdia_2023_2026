name: CI - E03 Fraud API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-e03:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r 7_semestre/cdia2/e03/requirements.txt

      - name: Treinar modelo local
        run: python 7_semestre/cdia2/e03/train.py

      - name: Iniciar API em background
        run: |
          cd 7_semestre/cdia2/e03
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Verificar endpoint raiz
        run: |
          curl --fail http://127.0.0.1:8000/

      - name: Verificar health do modelo
        run: |
          curl --fail http://127.0.0.1:8000/ml/health

      - name: Verificar predição
        run: |
          curl --fail --request POST "http://127.0.0.1:8000/ml/predict" \
            --header "Content-Type: application/json" \
            --data '{"valor_transacao": 250.0, "hora_transacao": 14, "distancia_ultima_compra": 12.5, "tentativas_senha": 1, "pais_diferente": 0, "device_risk_score": 0.3}'
