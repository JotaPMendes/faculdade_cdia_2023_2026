services:
  api:
    build:
      context: ../../e02
      dockerfile: ../e05/docker/Dockerfile
    env_file:
      - ../../e02/.env
    volumes:
      - bella-dados:/app/data
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bella:secreta@db:5432/bellatavolada
      PERSIST_PRATOS: "true"
      PRATOS_STORE_FILE: /app/data/pratos.json

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bellatavolada
      POSTGRES_USER: bella
      POSTGRES_PASSWORD: secreta
    volumes:
      - bella-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bella -d bellatavolada"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  bella-dados:
  bella-pg-data: